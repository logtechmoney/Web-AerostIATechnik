<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo oscuro con borde redondeado -->
  <rect x="0" y="0" width="100" height="100" rx="15" fill="#0a1f15"/>
  <!-- Círculo verde oscuro sutil -->
  <circle cx="50" cy="50" r="42" fill="#0d2a1a"/>
  <!-- Texto/logo blanco centrado -->
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <!-- Líneas decorativas verdes -->
  <line x1="30" y1="65" x2="70" y2="65" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
  <line x1="35" y1="72" x2="65" y2="72" stroke="#10B981" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
